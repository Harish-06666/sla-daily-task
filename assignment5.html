<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Registration Form</h3>

    <form action="./d2.html">
      <label for="firstname">Firstname: </label>
      <input
        type="text"
        name="firstname"
        id="firstname"
        placeholder="Enter firstname"
        required
      />

      <br />
      <br />

      <label for="lastname">Lastname: </label>
      <input
        type="text"
        name="lastname"
        id="lastname"
        placeholder="Enter lastname"
        required
      />

      <br /><br />

      <label for="email">Email: </label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Email"
        required
      /><br /><br />

      <label for="password">Password: </label>
      <input
        type="password"
        name="password"
        id="password"
        placeholder="password"
        required
      />
      <br />
      <br />
      <label for="dept">Select department:</label>

      <select name="dept" id="dept">
        <option>department</option>
        <optgroup>
          <option value="ECE">ECE</option>
          <option value="EEE">EEE</option>
          <option value="CSE">CSE</option>
          <option value="MECH">MECH</option>
          <option value="CIVIL">CIVIL</option>
        </optgroup>
      </select>

      <br /><br />

      <label for="age">Age:</label>
      <input
        type="number"
        name="age"
        id="age"
        min="0"
        max="50"
        placeholder="age"
        required
      />

      <br /><br />

      <label for="gender">Gender:</label>
      <input type="radio" name="gender" id="gender" required />
      <label for="Male">Male</label>

      <input type="radio" name="gender" id="gender" required />
      <label for="Female">Female</label>

      <br /><br />

      <label for="hobbies">Hobbies:</label>
      <label for="read">Reading</label>
      <input type="checkbox" name="hobbies" id="hobbies" />

      <label for="write">write</label>
      <input type="checkbox" name="hobbies" id="hobbies" />

      <label for="sing">sing</label>
      <input type="checkbox" name="hobbies" id="hobbiesg" />

      <br />
      <br />
      <label for="hobby"
        >Hobbies:
        <select name="hobby" id="hobby" size="3" multiple>
          <option value="read">read</option>
          <option value="write">write</option>
          <option value="sing">sing</option>
        </select>
      </label>

      <br /><br />

      <label for="date">Date_of_birth:</label>
      <input type="date" name="name" id="date" required />
      <br />
      <br />

      <label for="resume">Resume</label>
      <input type="file" name="resume" id="resume" required />

      <br />
      <br />

      <label for="color">Color:</label>
      <input type="color" id="color" />

      <input type="reset" name="reset" value="Reset" id="" />
      <br /><br />

      <input type="submit" value="submit" />
    </form>

</body>
</html>
