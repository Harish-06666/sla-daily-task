<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <style>
      .box {
        width: 300px;
        margin: 40px auto;
        border: 4px solid blue;
        padding: 20px;
        background-color: lightyellow;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h3>CSS Box Model</h3>
      <p>
        This is the content area of the box. The padding creates space around
        this text. The border surrounds the padding. The margin creates space
        outside the border.
      </p>
    </div>
</body>
</html>
